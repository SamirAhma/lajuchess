services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chess_user
      POSTGRES_PASSWORD: chess_password
      POSTGRES_DB: lajuchess
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chess_user -d lajuchess" ]
      interval: 5s
      timeout: 5s
      retries: 5

  lajuchess:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://chess_user:chess_password@postgres:5432/lajuchess
      - RUST_LOG=info
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
